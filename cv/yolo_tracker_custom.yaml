# copied from ultralytics repo and modified some vals
# ByteTrack tracker defaults for mode="track"
# Docs: https://docs.ultralytics.com/modes/track/

tracker_type: bytetrack
track_high_thresh: 0.20  # Lower than your 0.25 conf to ensure detections pass through
track_low_thresh: 0.05   # Keep very weak boxes to maintain ID during blur/motion
new_track_thresh: 0.25   # Match your code's conf to start a track
track_buffer: 300        # 10 seconds at 30fps
match_thresh: 0.8        # Standard overlap requirement
fuse_score: True